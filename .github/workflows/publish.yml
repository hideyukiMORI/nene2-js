name: Publish npm

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'npm publish --dry-run only'
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run check
      - run: npm run build
      - run: npm run pack:smoke
      - run: npm install -g npm@latest
      - name: Dry run
        if: ${{ inputs.dry_run }}
        run: npm publish --dry-run
      - name: Publish
        if: ${{ !inputs.dry_run }}
        run: npm publish --access public
