# Temporary port evacuation for field trials when :8080 / :3306 are taken.
# Usage (from sibling NENE2 checkout):
#   docker compose -f compose.yaml -f ../nene2-js/tools/compose-ft-evac.yaml up -d
#
# Then:
#   export NENE2_JS_API_BASE_URL=http://localhost:18080

services:
  app:
    ports: !override
      - '18080:80'
    environment:
      # Dev-only defaults for FT evac — override via shell .env when needed.
      NENE2_LOCAL_JWT_SECRET: ${NENE2_LOCAL_JWT_SECRET:-ft-evac-local-jwt-secret-min-32-chars!!}
      NENE2_MACHINE_API_KEY: ${NENE2_MACHINE_API_KEY:-ft-evac-local-machine-api-key-32ch!!}
  mysql:
    ports: !override
      - '13307:3306'
